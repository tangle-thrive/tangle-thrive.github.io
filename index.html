<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangle Thrive — Prototypes</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem;
      min-height: 100vh;
    }

    header {
      max-width: 720px;
      margin: 0 auto 2.5rem auto;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1rem;
      color: #555;
    }

    .prototypes {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      border: 1px solid #e0e0e0;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .card p {
      font-size: 0.875rem;
      color: #666;
    }

    footer {
      max-width: 720px;
      margin: 3rem auto 0 auto;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <header>
    <h1>Tangle Thrive</h1>
    <p>A collection of interactive prototypes. Click a card to explore.</p>
  </header>

  <div class="prototypes">
    <a class="card" href="prototypes/changemaker-rainier-scholars/index.html">
      <h2>You're a Changemaker</h2>
      <p>Rainier Scholars — goal-setting activity connecting character traits to real-world issues.</p>
    </a>

    <div class="card" style="border-style: dashed; color: #aaa; cursor: default;">
      <h2>More coming soon</h2>
      <p>Prototypes will appear here as they're added.</p>
    </div>
  </div>

  <footer>
    <p>Tangle Thrive &mdash; Hosted on GitHub Pages</p>
  </footer>
</body>
</html>
